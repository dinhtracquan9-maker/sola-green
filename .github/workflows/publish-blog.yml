name: Publish SOLA Journal article
on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"
concurrency:
  group: sola-blog-publisher
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate configuration
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_MODEL: ${{ secrets.BLOG_MODEL }}
        run: python scripts/publish_blog.py --check
      - name: Generate one article
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_MODEL: ${{ secrets.BLOG_MODEL }}
        run: python scripts/publish_blog.py
      - name: Commit article
        run: |
          git config user.name "SOLA Journal Bot"
          git config user.email "bot@solamedicalsupply.com"
          git add blog/ data/blog_queue.json
          if git diff --cached --quiet; then
            echo "No article generated."
          else
            git commit -m "Journal: publish scheduled article [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
