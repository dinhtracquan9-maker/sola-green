name: Build SOLA product pages
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max product pages to build this run (re-run to continue)"
        default: "60"
concurrency:
  group: sola-product-builder
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate configuration
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_MODEL: ${{ secrets.BLOG_MODEL }}
        run: python scripts/build_product_pages.py --check
      - name: Build product pages
        env:
          BLOG_API_URL: ${{ secrets.BLOG_API_URL }}
          BLOG_API_KEY: ${{ secrets.BLOG_API_KEY }}
          BLOG_MODEL: ${{ secrets.BLOG_MODEL }}
        run: python scripts/build_product_pages.py --limit ${{ github.event.inputs.limit }}
      - name: Commit pages
        run: |
          git config user.name "SOLA Journal Bot"
          git config user.email "bot@solamedicalsupply.com"
          git add products/ sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No new product pages."
          else
            git commit -m "Build product pages [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
